<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08001f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2b33a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="32"/>

  <!-- Hexagone extérieur (contour) -->
  <polygon
    points="200,48 280,92 280,180 200,224 120,180 120,92"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="2"
    opacity="0.4"
    filter="url(#glow)"
  />

  <!-- Hexagone intérieur -->
  <polygon
    points="200,72 258,104 258,168 200,200 142,168 142,104"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="1.5"
    opacity="0.25"
  />

  <!-- Lettre W stylisée au centre -->
  <path d="M 168,96 L 183,184 L 200,140 L 217,184 L 232,96"
        fill="none"
        stroke="url(#hexGrad)"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Points lumineux extrémités du W -->
  <circle cx="168" cy="96" r="4" fill="#00d4ff" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="232" cy="96" r="4" fill="#a855f7" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="200" cy="140" r="3" fill="#e2b33a" filter="url(#softGlow)" opacity="0.8"/>

  <!-- Lignes décoratives afrofuturistes -->
  <line x1="120" y1="136" x2="142" y2="136" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="258" y1="136" x2="280" y2="136" stroke="#a855f7" stroke-width="1" opacity="0.3"/>

  <!-- Petits hexagones décoratifs -->
  <polygon points="96,208 104,212 104,220 96,224 88,220 88,212" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>
  <polygon points="304,208 312,212 312,220 304,224 296,220 296,212" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.35"/>
  <polygon points="200,228 206,231 206,237 200,240 194,237 194,231" fill="none" stroke="#e2b33a" stroke-width="1" opacity="0.4"/>

  <!-- Nom WULIX -->
  <text
    x="200" y="290"
    font-family="'Arial', sans-serif"
    font-weight="900"
    font-size="52"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#glow)"
  >WULIX</text>

  <!-- Ligne décorative sous le nom -->
  <line x1="100" y1="305" x2="300" y2="305" stroke="url(#hexGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Slogan -->
  <text
    x="200" y="332"
    font-family="'Arial', sans-serif"
    font-weight="400"
    font-size="13"
    fill="#6ee7f7"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.75"
  >AUTOMATISE. PUBLIE. GÉNÈRE.</text>

  <!-- Points lumineux décoratifs -->
  <circle cx="88" cy="136" r="2" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="312" cy="160" r="2" fill="#a855f7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="152" cy="56" r="1.5" fill="#e2b33a" opacity="0.6"/>
  <circle cx="248" cy="56" r="1.5" fill="#e2b33a" opacity="0.6"/>
</svg>
