<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AISATOU Mobile</title>
  <style>
    :root {
      --bg: #090b0f; --panel: #0d1117; --border: #1e2330;
      --accent: #7c3aed; --accent2: #00e5ff; --green: #00e676;
      --text: #e2e8f0; --muted: #64748b; --danger: #ff5555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Header */
    .header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-orb {
      width: 32px; height: 32px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent2) 0%, var(--accent) 60%, transparent 100%);
      box-shadow: 0 0 12px rgba(0,229,255,.5); flex-shrink: 0;
      transition: transform .1s;
    }
    .header-orb.speaking { animation: orb-pulse .4s ease-in-out infinite alternate; }
    @keyframes orb-pulse { from { transform: scale(1); } to { transform: scale(1.3); box-shadow: 0 0 24px rgba(0,229,255,.9); } }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; color: var(--accent2); }
    .header-status { margin-left: auto; font-size: 11px; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .dot.off { background: var(--danger); }

    /* Messages */
    .messages {
      padding: 12px; overflow-y: auto;
      height: calc(100dvh - 60px - 70px);
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { display: flex; gap: 8px; max-width: 90%; animation: fade-in .2s ease; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #1a0533); color: var(--accent2); }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #1e3a5f, #0a1628); color: #90caf9; }
    .msg-bubble {
      padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.5;
      max-width: calc(100% - 40px);
    }
    .msg.ai .msg-bubble { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), #4c1d95); color: #fff; border-bottom-right-radius: 4px; }
    .msg.tool .msg-bubble { background: #0a1628; border: 1px solid #1e3a5f; color: #90caf9; font-size: 12px; font-family: monospace; }
    .thinking { display: flex; gap: 4px; padding: 12px; }
    .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: bounce .6s ease-in-out infinite; }
    .thinking span:nth-child(2) { animation-delay: .1s; }
    .thinking span:nth-child(3) { animation-delay: .2s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    /* Input */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--panel); border-top: 1px solid var(--border);
      padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1; background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 20px; padding: 10px 14px; font-size: 15px; resize: none;
      min-height: 40px; max-height: 100px; outline: none; line-height: 1.4;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .btn-send, .btn-mic {
      width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      flex-shrink: 0; transition: all .2s;
    }
    .btn-send { background: linear-gradient(135deg, var(--accent), #4c1d95); color: #fff; }
    .btn-send:active { transform: scale(.9); }
    .btn-mic { background: var(--panel); border: 1px solid var(--border); color: var(--muted); }
    .btn-mic.active { background: #ff6b35; color: #fff; border-color: #ff6b35; box-shadow: 0 0 12px rgba(255,107,53,.5); }
    .btn-mic.listening { background: #ff1744; color: #fff; animation: pulse-mic .4s infinite alternate; }
    @keyframes pulse-mic { from { box-shadow: 0 0 4px rgba(255,23,68,.4); } to { box-shadow: 0 0 16px rgba(255,23,68,.9); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-orb" id="orb"></div>
  <div class="header-title">AISATOU</div>
  <div class="header-status"><span class="dot off" id="ws-dot"></span><span id="ws-label">Connexion…</span></div>
</div>

<div class="messages" id="messages">
  <div class="msg ai">
    <div class="msg-avatar">A</div>
    <div class="msg-bubble">Bonjour Omar. Je suis prête.</div>
  </div>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="Message…" rows="1"></textarea>
  <button class="btn-mic" id="mic-btn" onclick="toggleMic()" title="Wake word">🎙</button>
  <button class="btn-send" onclick="send()">➤</button>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────
const savedUser = localStorage.getItem('aisatou_user') || 'aisatou';
const savedPass = localStorage.getItem('aisatou_pass') || 'WULIX2026';
const AUTH = { headers: { 'Authorization': 'Basic ' + btoa(`${savedUser}:${savedPass}`) } };

// ── Elements ──────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const orbEl      = document.getElementById('orb');

// ── WebSocket ─────────────────────────────────────────────────────────────
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const WS_URL = `${proto}://${location.host}/ws`;
let ws;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => setStatus(true);
  ws.onclose = () => { setStatus(false); setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'thinking')      { showThinking(); }
    else if (msg.type === 'response') { hideThinking(); addMsg('ai', msg.text); }
    else if (msg.type === 'tool_call') { addMsg('tool', `⚙ ${msg.tool}`); }
    else if (msg.type === 'voice_state') { handleVoiceState(msg.state); }
    else if (msg.type === 'voice_volume') { updateOrb(msg.volume); }
  };
}
connect();

function setStatus(ok) {
  document.getElementById('ws-dot').className = 'dot ' + (ok ? 'on' : 'off');
  document.getElementById('ws-label').textContent = ok ? 'En ligne' : 'Reconnexion…';
}

// ── Messages ──────────────────────────────────────────────────────────────
function addMsg(role, text) {
  hideThinking();
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const av = role === 'user' ? 'O' : 'A';
  d.innerHTML = `<div class="msg-avatar">${av}</div><div class="msg-bubble">${role === 'ai' ? text.replace(/</g,'&lt;') : text.replace(/</g,'&lt;')}</div>`;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

let _thinkEl = null;
function showThinking() {
  if (_thinkEl) return;
  _thinkEl = document.createElement('div');
  _thinkEl.className = 'msg ai';
  _thinkEl.innerHTML = '<div class="msg-avatar">A</div><div class="thinking"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(_thinkEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideThinking() {
  if (_thinkEl) { _thinkEl.remove(); _thinkEl = null; }
}

// ── Send ──────────────────────────────────────────────────────────────────
function send() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'message', text, model: 'gemini-2.0-flash-lite' }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// ── Voix ──────────────────────────────────────────────────────────────────
function handleVoiceState(state) {
  if (state === 'speaking') orbEl.classList.add('speaking');
  else orbEl.classList.remove('speaking');
}
function updateOrb(vol) {
  const scale = 1 + vol * 0.4;
  orbEl.style.transform = `scale(${scale})`;
  setTimeout(() => { orbEl.style.transform = ''; }, 80);
}

// ── Wake word (Web Speech API) ────────────────────────────────────────────
let _sttActive = false, _rec = null;
const WAKE_WORDS = ['aisatou','aïsatou','aisatu','isatou','aissatou'];

function toggleMic() {
  _sttActive ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Web Speech non supporté — utilise Chrome'); return; }
  _rec = new SR();
  _rec.lang = 'fr-FR';
  _rec.continuous = true;
  _rec.interimResults = true;
  _rec.onstart = () => {
    _sttActive = true;
    document.getElementById('mic-btn').classList.add('active');
  };
  _rec.onresult = (e) => {
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript.toLowerCase();
    }
    if (!final) return;
    const hasWake = WAKE_WORDS.some(w => final.includes(w));
    if (hasWake) {
      document.getElementById('mic-btn').classList.add('listening');
      let cmd = final;
      for (const w of WAKE_WORDS) {
        const idx = cmd.indexOf(w);
        if (idx !== -1) { cmd = cmd.slice(idx + w.length).trim().replace(/^[,.\s]+/,''); break; }
      }
      document.getElementById('mic-btn').classList.remove('listening');
      if (cmd) {
        addMsg('user', `🎙 ${cmd}`);
        if (ws && ws.readyState === 1)
          ws.send(JSON.stringify({ type: 'voice_message', text: cmd, model: 'gemini-2.0-flash-lite' }));
      }
    }
  };
  _rec.onend = () => { if (_sttActive) try { _rec.start(); } catch(e) {} };
  _rec.start();
}

function stopMic() {
  _sttActive = false;
  if (_rec) { try { _rec.stop(); } catch(e) {} _rec = null; }
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('active','listening');
}
</script>
</body>
</html>
